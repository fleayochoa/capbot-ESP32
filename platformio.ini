; PlatformIO Project Configuration
; Dos entornos:
;   [env:esp32dev]  -> flashea firmware al hardware
;
; El codec se diseñó sin dependencias Arduino, así que se puede verificar
; byte a byte contra la implementación Python de la Jetson sin hardware.

[platformio]
default_envs = esp32dev

; -----------------------------------------------------------------------------
; Firmware real
; -----------------------------------------------------------------------------
[env:esp32dev]
platform = espressif32 @6.13.0
board = upesy_wroom
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; C++17 para if-constexpr y structured bindings
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -DCORE_DEBUG_LEVEL=3
    -I include

;build_unflags =
;    -std=gnu++11

; Dependencias: ArduinoJson para armar telemetría JSON
lib_deps =
    bblanchon/ArduinoJson @ ^7.4.3

; Exponer include/ y las libs a otras libs (por defecto pio aisla cada lib).
; LDF en modo "deep+" resuelve transitively los includes entre Protocol,
; Sensors, Motors y Link.
lib_ldf_mode = deep+
