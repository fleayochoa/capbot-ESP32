; PlatformIO Project Configuration
; Dos entornos:
;   [env:esp32dev]  -> flashea firmware al hardware
;   [env:native]    -> compila el codec Protocol en PC para tests unitarios
;
; El codec se diseñó sin dependencias Arduino, así que se puede verificar
; byte a byte contra la implementación Python de la Jetson sin hardware.

[platformio]
default_envs = esp32dev

; -----------------------------------------------------------------------------
; Firmware real
; -----------------------------------------------------------------------------
[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

; C++17 para if-constexpr y structured bindings
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -DCORE_DEBUG_LEVEL=3

build_unflags =
    -std=gnu++11

; Dependencias: ArduinoJson para armar telemetría JSON
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.0

; Tamaño de buffer serial: dejamos amplio para ráfagas
board_build.partitions = default.csv

; -----------------------------------------------------------------------------
; Tests nativos (PC) del codec
; -----------------------------------------------------------------------------
[env:native]
platform = native
test_framework = unity
build_flags =
    -std=gnu++17
    -Wall
    -Wextra
    -I lib/Protocol/src